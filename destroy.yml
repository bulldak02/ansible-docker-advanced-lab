---
- name: Docker 3-Tier 실습 환경 삭제
  hosts: docker_hosts
  become: true
  gather_facts: false

  pre_tasks:
    - name: 삭제 승인 확인
      ansible.builtin.assert:
        that:
          - confirm_destroy | default(false) | bool
        fail_msg: >-
          삭제하려면 -e confirm_destroy=true를 지정하십시오.
          DB 볼륨까지 삭제하려면 -e delete_data=true를 추가하십시오.

  roles:
    - role: app_stack
      tasks_from: destroy
